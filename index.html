<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#1a1a1a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<title>Boxing Timer</title>
<link rel="icon" type="image/png" href="favicon.png">
<link rel="manifest" href="manifest.json">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:system-ui,sans-serif;background:#111;color:#fff;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1rem;user-select:none}
  h1{font-size:1rem;letter-spacing:.2em;text-transform:uppercase;color:#888;margin-bottom:1.5rem}
  .ring{position:relative;width:clamp(240px,40vmin,420px);height:clamp(240px,40vmin,420px);margin:0 auto 1.5rem}
  svg.progress{position:absolute;top:0;left:0;width:100%;height:100%;transform:rotate(-90deg)}
  .ring-track{fill:none;stroke:#333;stroke-width:12}
  .ring-fill{fill:none;stroke-width:12;stroke-linecap:round;transition:stroke-dashoffset .9s linear,stroke .4s}
  .ring-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px}
  #time{font-size:clamp(3rem,8vmin,6rem);font-weight:700;letter-spacing:-.02em;font-variant-numeric:tabular-nums}
  #phase{font-size:clamp(.75rem,1.5vmin,1.1rem);letter-spacing:.15em;text-transform:uppercase;color:#888}
  #round-info{font-size:clamp(.9rem,1.8vmin,1.3rem);color:#aaa;margin-bottom:1.5rem}
  h1{font-size:clamp(1rem,1.5vmin,1.2rem);letter-spacing:.2em;text-transform:uppercase;color:#888;margin-bottom:1.5rem}
  .controls{display:flex;gap:12px;margin-bottom:1.5rem}
  button{padding:.6rem 1.4rem;border-radius:999px;border:none;font-size:.9rem;font-weight:600;cursor:pointer;transition:transform .1s,opacity .1s}
  button:active{transform:scale(.95)}
  #btn-start{background:#2ecc71;color:#fff;min-width:100px}
  #btn-start.running{background:#444;color:#fff}
  #btn-reset{background:#222;color:#aaa;border:1px solid #333}
  #btn-skip{background:#222;color:#aaa;border:1px solid #333}
  .settings{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:16px;padding:1.25rem;width:100%;max-width:320px;margin-bottom:1rem}
  .settings summary{cursor:pointer;font-size:.85rem;color:#888;letter-spacing:.1em;text-transform:uppercase;list-style:none}
  .settings summary::after{content:" ▾"}
  details[open] summary::after{content:" ▴"}
  .row{display:flex;align-items:center;justify-content:space-between;margin-top:.9rem;font-size:.85rem;color:#ccc}
  .row span{min-width:36px;text-align:right;color:#fff;font-weight:600}
  input[type=range]{width:120px;accent-color:#e63946}
  .presets{display:flex;gap:8px;margin-top:.9rem;flex-wrap:wrap}
  .preset{padding:.35rem .8rem;border-radius:999px;background:#222;border:1px solid #333;color:#aaa;font-size:.75rem;cursor:pointer}
  .preset:hover{border-color:#2ecc71;color:#2ecc71}
  .preset.active{background:#2ecc71;color:#111;border-color:#2ecc71}
  .top-presets{display:flex;gap:10px;margin-bottom:1.2rem}
  .right-panel{display:flex;flex-direction:column;align-items:center}
  #mute-btn{background:none;border:none;cursor:pointer;position:fixed;top:1rem;right:1rem;padding:.4rem;color:#666;line-height:0}
  #mute-btn:hover{color:#aaa}
  @media(orientation:landscape) and (max-height:500px){
    body{display:grid;grid-template-columns:auto 1fr;grid-template-rows:auto auto 1fr;justify-content:center;align-content:stretch;gap:0 2rem;padding:.5rem 1rem}
    h1{grid-column:2;grid-row:1;margin-bottom:.25rem;text-align:center;align-self:end}
    .top-presets{grid-column:2;grid-row:2;justify-content:center;margin-bottom:0;align-self:start}
    .ring{grid-column:1;grid-row:1/4;width:clamp(160px,70vh,280px);height:clamp(160px,70vh,280px);margin:0;align-self:center}
    #time{font-size:clamp(2.5rem,6vh,4rem)}
    #phase{font-size:clamp(.7rem,1.5vh,1rem)}
    .right-panel{grid-column:2;grid-row:3;display:flex;flex-direction:column;align-items:center;justify-content:end;gap:.5rem}
    #round-info{margin-bottom:.5rem;font-size:clamp(.85rem,2vh,1.1rem)}
    .controls{margin-bottom:.5rem}
    .settings{max-width:280px;margin-bottom:.5rem}
  }
  @media(min-width:768px) and (min-height:500px){
    .ring{width:clamp(400px,50vmin,600px);height:clamp(400px,50vmin,600px)}
    #time{font-size:clamp(5rem,10vmin,8rem)}
    #phase{font-size:clamp(1.1rem,2vmin,1.6rem)}
    #round-info{font-size:clamp(1.3rem,2.5vmin,1.8rem)}
    h1{font-size:clamp(1.2rem,2vmin,1.6rem)}
    button{padding:.8rem 2rem;font-size:1.1rem}
    #btn-start{min-width:130px}
    .settings{max-width:420px;padding:1.5rem}
    .row{font-size:1rem}
    input[type=range]{width:160px}
  }
</style>
</head>
<body>

<h1>Boxing Timer <span style="font-size:0.5em;opacity:0.5">v11</span></h1>

<div class="top-presets">
  <button class="preset active" id="pre-boxing" onclick="applyPreset(12,180,60,10,10,'pre-boxing')">Boxing</button>
  <button class="preset" id="pre-calisthenics" onclick="applyPreset(25,40,20,5,5,'pre-calisthenics')">Calisthenics</button>
</div>

<div class="ring">
  <svg class="progress" viewBox="0 0 240 240">
    <circle class="ring-track" cx="120" cy="120" r="108"/>
    <circle class="ring-fill" id="ring-fill" cx="120" cy="120" r="108" stroke="#e63946"
      stroke-dasharray="678.6" stroke-dashoffset="0"/>
  </svg>
  <div class="ring-center">
    <div id="time">3:00</div>
    <div id="phase">Ready</div>
  </div>
</div>

<div class="right-panel">
<div id="round-info">Round 1 of 8</div>

<div class="controls">
  <button id="btn-reset" onclick="reset()">Reset</button>
  <button id="btn-start" onclick="toggle()">Start</button>
  <button id="btn-skip" onclick="skip()">Skip</button>
</div>

<details class="settings">
  <summary>Settings</summary>
  <div class="row">Rounds
    <div style="display:flex;align-items:center;gap:8px">
      <input type="range" id="s-rounds" min="1" max="40" value="8" oninput="updateSettings()">
      <span id="v-rounds">8</span>
    </div>
  </div>
  <div class="row">Round
    <div style="display:flex;align-items:center;gap:8px">
      <input type="range" id="s-rdur" min="30" max="240" step="5" value="180" oninput="updateSettings()">
      <span id="v-rdur">3:00</span>
    </div>
  </div>
  <div class="row">Rest (sec)
    <div style="display:flex;align-items:center;gap:8px">
      <input type="range" id="s-rest" min="15" max="120" step="5" value="60" oninput="updateSettings()">
      <span id="v-rest">60</span>
    </div>
  </div>
  <div class="row">Prep (sec)
    <div style="display:flex;align-items:center;gap:8px">
      <input type="range" id="s-prep" min="0" max="20" step="1" value="10" oninput="updateSettings()">
      <span id="v-prep">10</span>
    </div>
  </div>
  <div class="row">Warning (sec)
    <div style="display:flex;align-items:center;gap:8px">
      <input type="range" id="s-warn" min="0" max="30" step="5" value="10" oninput="updateSettings()">
      <span id="v-warn">10</span>
    </div>
  </div>
  <div class="presets">
    <button class="preset active" id="pre-boxing2" onclick="applyPreset(12,180,60,10,10,'pre-boxing')">Boxing</button>
    <button class="preset" id="pre-calisthenics2" onclick="applyPreset(25,40,20,5,5,'pre-calisthenics')">Calisthenics</button>
  </div>
</details>
</div>

<button id="mute-btn" onclick="toggleMute()" title="Toggle sound">
  <svg id="icon-on" width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <path d="M18 8a6 6 0 0 1 0 8"/>
    <path d="M14 10.5a2 2 0 0 1 0 3"/>
    <path d="M4 14H3a1 1 0 0 1-1-1v-2a1 1 0 0 1 1-1h1l4-4v12l-4-4z"/>
  </svg>
  <svg id="icon-off" width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="display:none">
    <path d="M4 14H3a1 1 0 0 1-1-1v-2a1 1 0 0 1 1-1h1l4-4v12l-4-4z"/>
    <line x1="23" y1="9" x2="17" y2="15"/>
    <line x1="17" y1="9" x2="23" y2="15"/>
  </svg>
</button>

<script>
const CIRC = 678.6;
let cfg = {rounds:8, rdur:3, rest:60, prep:10, warn:10};
let state = {phase:'prep', round:1, remaining:0, total:0, running:false, warned:false};
let interval = null;
let muted = false;
const bellAudio = new Audio('bell.mp3');
const warningAudio = new Audio('warning.mp3');
var audioCtx = new (window.AudioContext || window.webkitAudioContext)();
var warningSource = audioCtx.createMediaElementSource(warningAudio);
var warningGain = audioCtx.createGain();
warningGain.gain.value = 3.0;
warningSource.connect(warningGain);
warningGain.connect(audioCtx.destination);

function bell(){
  if(muted) return;
  if(audioCtx.state === 'suspended') audioCtx.resume();
  bellAudio.currentTime = 0;
  bellAudio.play().catch(function(){});
}

function warningBeep(){
  if(muted) return;
  if(audioCtx.state === 'suspended') audioCtx.resume();
  warningAudio.currentTime = 0;
  warningAudio.play().catch(function(){});
}

function endBeep(){
  bell();
}

function fmtTime(s){
  var m = Math.floor(s/60);
  var sec = s%60;
  return m+':'+(sec<10?'0':'')+sec;
}

function phaseDuration(){
  if(state.phase==='prep') return cfg.prep||1;
  if(state.phase==='fight') return Math.round(cfg.rdur*60);
  if(state.phase==='rest') return cfg.rest;
  return 0;
}

function updateRing(remaining, total, phase){
  var fill = document.getElementById('ring-fill');
  var ratio = total > 0 ? remaining/total : 1;
  fill.style.strokeDashoffset = CIRC*(1-ratio);
  if(phase==='prep') fill.style.stroke='#f4a261';
  else if(phase==='fight') fill.style.stroke = (remaining <= cfg.warn && remaining > 0) ? '#ffb703' : '#2ecc71';
  else fill.style.stroke='#3a86ff';
}

function updateUI(){
  document.getElementById('time').textContent = fmtTime(state.remaining);
  var phaseEl = document.getElementById('phase');
  if(state.phase==='prep') phaseEl.textContent='Get Ready';
  else if(state.phase==='fight') phaseEl.textContent='Fight!';
  else phaseEl.textContent='Rest';
  document.getElementById('round-info').textContent = 'Round '+state.round+' of '+cfg.rounds;
  updateRing(state.remaining, phaseDuration(), state.phase);
}

function startPhase(phase, round){
  state.phase = phase;
  state.round = round;
  state.warned = false;
  var dur = phaseDuration();
  state.remaining = dur;
  state.total = dur;
  if(phase==='fight') bell();
  if(phase==='rest') endBeep();
  updateUI();
}

function tick(){
  state.remaining--;
  if(state.phase==='fight' && state.remaining===cfg.warn && !state.warned && cfg.warn>0){
    state.warned=true;
    warningBeep();
  }
  if(state.remaining<=0){
    if(state.phase==='prep'){
      startPhase('fight',state.round);
    } else if(state.phase==='fight'){
      if(state.round>=cfg.rounds){
        endBeep();
        clearInterval(interval); interval=null; state.running=false;
        state.phase='done';
        document.getElementById('time').textContent='Done!';
        document.getElementById('phase').textContent='Workout complete';
        document.getElementById('round-info').textContent=cfg.rounds+' rounds finished';
        document.getElementById('btn-start').textContent='Start';
        document.getElementById('btn-start').classList.remove('running');
        updateRing(0,1,'fight');
        return;
      }
      startPhase('rest',state.round);
    } else if(state.phase==='rest'){
      startPhase('fight',state.round+1);
    }
    return;
  }
  updateUI();
}

function toggle(){
  if(state.running){
    clearInterval(interval); interval=null; state.running=false;
    document.getElementById('btn-start').textContent='Resume';
    document.getElementById('btn-start').classList.remove('running');
  } else {
    if(state.phase==='done') return;
    state.running=true;
    document.getElementById('btn-start').textContent='Pause';
    document.getElementById('btn-start').classList.add('running');
    interval=setInterval(tick,1000);
  }
}

function reset(){
  clearInterval(interval); interval=null; state.running=false;
  document.getElementById('btn-start').textContent='Start';
  document.getElementById('btn-start').classList.remove('running');
  var prep = cfg.prep>0;
  state.phase = prep?'prep':'fight';
  state.round = 1;
  state.warned = false;
  state.remaining = prep ? cfg.prep : Math.round(cfg.rdur*60);
  state.total = state.remaining;
  updateUI();
}

function skip(){
  if(!state.running && state.phase!=='done') return;
  clearInterval(interval);
  state.remaining=1;
  tick();
  if(state.running && state.phase!=='done'){
    interval=setInterval(tick,1000);
  }
}

function updateSettings(){
  cfg.rounds = +document.getElementById('s-rounds').value;
  cfg.rdur   = +document.getElementById('s-rdur').value/60;
  cfg.rest   = +document.getElementById('s-rest').value;
  cfg.prep   = +document.getElementById('s-prep').value;
  cfg.warn   = +document.getElementById('s-warn').value;
  document.getElementById('v-rounds').textContent = cfg.rounds;
  document.getElementById('v-rdur').textContent   = fmtTime(+document.getElementById('s-rdur').value);
  document.getElementById('v-rest').textContent   = cfg.rest;
  document.getElementById('v-prep').textContent   = cfg.prep;
  document.getElementById('v-warn').textContent   = cfg.warn;
  if(!state.running) reset();
}

function applyPreset(rounds,rdurSec,rest,prep,warn,activeId){
  var rdurSlider = document.getElementById('s-rdur');
  if(activeId === 'pre-calisthenics'){
    rdurSlider.min = 30; rdurSlider.max = 60; rdurSlider.step = 5;
  } else {
    rdurSlider.min = 30; rdurSlider.max = 240; rdurSlider.step = 5;
  }
  document.getElementById('s-rounds').value = rounds;
  rdurSlider.value = rdurSec;
  document.getElementById('s-rest').value   = rest;
  document.getElementById('s-prep').value   = prep;
  document.getElementById('s-warn').value   = warn;
  updateSettings();
  ['pre-boxing','pre-calisthenics','pre-boxing2','pre-calisthenics2'].forEach(function(id){
    var el = document.getElementById(id);
    if(el) el.classList.toggle('active', id===activeId || id===activeId+'2');
  });
}

function toggleMute(){
  muted=!muted;
  document.getElementById('icon-on').style.display  = muted?'none':'';
  document.getElementById('icon-off').style.display = muted?'':'none';
}

if('wakeLock' in navigator){
  document.getElementById('btn-start').addEventListener('click',async function(){
    if(state.running){
      try{ await navigator.wakeLock.request('screen'); }catch(e){}
    }
  });
}

reset();

if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js');
}
</script>
</body>
</html>
